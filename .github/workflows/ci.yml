name: SmartHoneyNet CI

on:
  push:
    paths:
      - "smart-home-honeynet/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "smart-home-honeynet/**"
  workflow_dispatch: {}

defaults:
  run:
    working-directory: smart-home-honeynet

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Run test suite with coverage
        run: python -m pytest --cov=honeynet --cov-report=term-missing -q

      - name: Smoke-test the end-to-end demo
        run: python -m honeynet demo --db /tmp/ci-demo.db --out /tmp/ci-report.md

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Byte-compile all sources
        run: python -m compileall src
