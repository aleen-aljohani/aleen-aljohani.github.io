# Logstash pipeline — ingests honeypot events and IDS alerts into Elasticsearch.
# This is the deployment-grade equivalent of honeynet.pipeline.Pipeline.
#
# Input : JSON lines written by the honeypots (logs/events.jsonl) and the
#         detection engine (logs/alerts.jsonl), or Filebeat.
# Output: two Elasticsearch indices consumed by the Kibana dashboards.

input {
  file {
    path => "/var/log/honeynet/events.jsonl"
    start_position => "beginning"
    sincedb_path => "/var/lib/logstash/honeynet-events.sincedb"
    codec => json
    tags => ["honeypot_event"]
  }
  file {
    path => "/var/log/honeynet/alerts.jsonl"
    start_position => "beginning"
    sincedb_path => "/var/lib/logstash/honeynet-alerts.sincedb"
    codec => json
    tags => ["ids_alert"]
  }
}

filter {
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }

  if "honeypot_event" in [tags] {
    mutate { add_field => { "[@metadata][index]" => "honeynet-events" } }
    # GeoIP enrichment for external source addresses (needs the GeoLite2 DB).
    geoip {
      source => "source_ip"
      target => "geo"
      tag_on_failure => ["_geoip_lookup_private"]
    }
  }

  if "ids_alert" in [tags] {
    mutate { add_field => { "[@metadata][index]" => "honeynet-alerts" } }
  }
}

output {
  elasticsearch {
    hosts => ["${ELASTIC_HOSTS:http://elasticsearch:9200}"]
    index => "%{[@metadata][index]}-%{+YYYY.MM.dd}"
    # user => "${ELASTIC_USER}"
    # password => "${ELASTIC_PASSWORD}"
  }
  # Uncomment for debugging:
  # stdout { codec => rubydebug }
}
