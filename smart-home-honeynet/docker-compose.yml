# SmartHoneyNet — full deployment stack.
# Replaces the three manually-provisioned VirtualBox VMs from the original
# project with reproducible containers on an isolated bridge network:
#
#   honeynet-sensors  -> Telnet + HTTP honeypots (this project)
#   elasticsearch     -> storage & search           (ELK)
#   logstash          -> ingest pipeline            (ELK)
#   kibana            -> dashboards & visualisation  (ELK)
#
# Bring it up with:  docker compose up -d
# Then import config/kibana/honeynet-dashboards.ndjson in Kibana.

name: smart-home-honeynet

networks:
  honeynet:
    driver: bridge

volumes:
  es-data:
  honeynet-logs:

services:
  sensors:
    build: .
    image: smart-home-honeynet:latest
    container_name: honeynet-sensors
    command: ["serve", "--telnet-port", "2323", "--http-port", "8080", "--db", "/data/honeynet.db"]
    environment:
      HONEYNET_TELNET_HOST: "0.0.0.0"
      HONEYNET_HTTP_HOST: "0.0.0.0"
      HONEYNET_EVENTS_JSONL: "/var/log/honeynet/events.jsonl"
      HONEYNET_ALERTS_JSONL: "/var/log/honeynet/alerts.jsonl"
    volumes:
      - honeynet-logs:/var/log/honeynet
      - ./data:/data
    ports:
      # Exposed on the host lab interface ONLY. Do NOT forward from the internet.
      - "127.0.0.1:2323:2323"
      - "127.0.0.1:8080:8080"
    networks: [honeynet]
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: honeynet-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "127.0.0.1:9200:9200"
    networks: [honeynet]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: honeynet-logstash
    environment:
      ELASTIC_HOSTS: "http://elasticsearch:9200"
    volumes:
      - ./config/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - honeynet-logs:/var/log/honeynet:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks: [honeynet]

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: honeynet-kibana
    environment:
      ELASTICSEARCH_HOSTS: "http://elasticsearch:9200"
    ports:
      - "127.0.0.1:5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks: [honeynet]
