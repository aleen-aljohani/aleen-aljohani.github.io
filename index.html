document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-width:52ch\">{{ t.contact.note }}<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;gap:13px;justify-content:center;margin-bottom:30px\">\n          <a href=\"mailto:aleensaljohani@gmail.com\" style=\"display:inline-flex;align-items:center;gap:9px;padding:14px 26px;background:#f59e42;color:#14110d;text-decoration:none;border-radius:9px;font-weight:600;font-size:15px;box-shadow:0 14px 32px -12px rgba(245,158,66,.55);transition:transform .2s\" style-hover=\"transform:translateY(-2px)\">{{ t.contact.email }}<\u002Fa>\n          <button onclick=\"{{ openCV }}\" style=\"display:inline-flex;align-items:center;gap:9px;padding:14px 26px;background:transparent;color:#f0e7da;border:1px solid rgba(245,158,66,.4);border-radius:9px;font-weight:500;font-size:15px;cursor:pointer;font-family:inherit;transition:background .2s\" style-hover=\"background:rgba(245,158,66,.1)\">{{ t.contact.cv }}<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:22px;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:13.5px\">\n          <a href=\"https://github.com/aleen-aljohani/\" target=\"_blank\" rel=\"noopener\" style=\"color:#9a8c79;text-decoration:none;transition:color .2s\" style-hover=\"color:#f59e42\">github.com/aleen-aljohani<\u002Fa>\n          <a href=\"https://www.linkedin.com/in/aleen-aljohani/\" target=\"_blank\" rel=\"noopener\" style=\"color:#9a8c79;text-decoration:none;transition:color .2s\" style-hover=\"color:#f59e42\">linkedin.com/in/aleen-aljohani<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n\n  <footer style=\"position:relative;z-index:1;border-top:1px solid rgba(245,158,66,.12);padding:36px clamp(20px,5vw,60px);max-width:1180px;margin:0 auto;display:flex;flex-wrap:wrap;gap:14px;justify-content:space-between;align-items:center\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#7c7160\">© 2026 Aleen Saleh Aljohany · {{ t.footer }}<\u002Fdiv>\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#7c7160\">{{ t.builtWith }}<\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = { lang: 'en' };\n\n  data() {\n    return {\n      certs: [\n        { abbr:'eJPT', org:'INE / eLearnSecurity', cat_en:'Offensive', cat_ar:'هجومي', en:'Junior Penetration Tester', ar:'مختبِر اختراق مبتدئ معتمد' },\n        { abbr:'eCPPT', org:'INE / eLearnSecurity', cat_en:'Offensive', cat_ar:'هجومي', en:'Certified Professional Penetration Tester', ar:'مختبِر اختراق محترف معتمد' },\n        { abbr:'eCIR', org:'INE / eLearnSecurity', cat_en:'Defensive', cat_ar:'دفاعي', en:'Certified Incident Responder', ar:'مستجيب للحوادث الأمنية معتمد' },\n        { abbr:'CEH', org:'EC-Council', cat_en:'Offensive', cat_ar:'هجومي', en:'Certified Ethical Hacker', ar:'هاكر أخلاقي معتمد' },\n        { abbr:'Security+', org:'CompTIA', cat_en:'Foundations', cat_ar:'أساسيات', en:'CompTIA Security+', ar:'سكيورتي بلس من كومبتيا' }\n      ],\n      projects: [\n        {\n          name:'ChainShield', repo:'aleen-aljohani/chainshield', url:'https://github.com/aleen-aljohani/chainshield',\n          tag_en:'DDoS Defense', tag_ar:'حماية من DDoS',\n          en:'Blockchain-inspired DDoS rate limiting for Python web services — a sliding-window limiter, an auto-expiring blacklist, and a global request ceiling that shuts down Sybil floods.',\n          ar:'حدّ معدّل لهجمات DDoS مستوحى من البلوك تشين لخدمات بايثون — محدّد بنافذة منزلقة، وقائمة حظر مؤقتة تنتهي تلقائيًا، وسقف عام للطلبات يوقف هجمات Sybil.',\n          stats_en:['~600K checks / sec','90%+ test coverage','3-layer protection model'],\n          stats_ar:['~600 ألف فحص / ثانية','تغطية اختبارات +90%','نموذج حماية ثلاثي الطبقات'],\n          tags:['Python','Flask','FastAPI','Rate-Limiting']\n        },\n        {\n          name:'WinAudit', repo:'aleen-aljohani/winaudit', url:'https://github.com/aleen-aljohani/winaudit',\n          tag_en:'Windows Pentest', tag_ar:'اختبار اختراق ويندوز',\n          en:'A Windows security assessment toolkit that automates privilege-escalation checks, SMB vulnerability scanning, and hardening audits — shipping a PowerShell remediation script for every finding.',\n          ar:'حزمة تقييم أمني لأنظمة ويندوز تُؤتمت فحص تصعيد الصلاحيات، وفحص ثغرات SMB، وتدقيق التحصين — مع سكربت PowerShell لمعالجة كل نتيجة.',\n          stats_en:['AlwaysInstallElevated → SYSTEM','SMB / EternalBlue detection','Auto PowerShell remediation'],\n          stats_ar:['AlwaysInstallElevated ← SYSTEM','كشف SMB / EternalBlue','معالجة PowerShell آلية'],\n          tags:['Python','PowerShell','Nmap','Pentest']\n        }\n      ],\n      skills: [\n        { en:'Offensive', ar:'الأمن الهجومي', items:['Penetration Testing','Privilege Escalation','Network Scanning','Exploitation','Active Directory'] },\n        { en:'Defensive', ar:'الأمن الدفاعي', items:['Incident Response','System Hardening','Threat Modeling','Vulnerability Assessment'] },\n        { en:'Tooling', ar:'الأدوات', items:['Nmap','Metasploit','Burp Suite','Wireshark','Kali Linux'] },\n        { en:'Code', ar:'البرمجة', items:['Python','PowerShell','Bash','Flask / FastAPI'] }\n      ]\n    };\n  }\n\n  T() {\n    const en = {\n      langSwitch:'العربية',\n      nav:{ about:'about', certs:'certs', projects:'projects', skills:'arsenal', contact:'contact' },\n      hero:{ kicker:'secure session established', role:'Cybersecurity Specialist', sub:'Offensive security, Windows internals, and defensive tooling. I break systems to understand exactly how to defend them.', cta1:'View Projects', cta2:'↓ Download CV' },\n      about:{ label:'01 — whoami', title:'About', body:'I\\u2019m a cybersecurity specialist focused on offensive security and Windows systems. My work spans penetration testing, privilege-escalation research, and building defensive tooling that turns real-world findings into automated checks and remediation.', body2:'I care about depth over noise: understanding how an attack actually works, then shipping something that makes the next attack harder.',\n        s1:'Certifications', s2:'Open-source tools', s3:'Focus areas' , s3v:'Offense + Defense'},\n      certs:{ label:'02 — credentials', title:'Certifications', note:'Hands-on, validated security certifications.' },\n      projects:{ label:'03 — repositories', title:'Projects', note:'Open-source security tooling, built from real engagements.', view:'View on GitHub' },\n      skills:{ label:'04 — arsenal', title:'Arsenal', note:'The techniques, tools, and languages I work with.' },\n      contact:{ label:'05 — connect', title:'Let\\u2019s talk security.', note:'Open to security roles, collaborations, and research. Reach out anytime.', email:'Send an email', cv:'↓ Download CV' },\n      footer:'Cybersecurity Specialist', builtWith:'designed & built with intent'\n    };\n    const ar = {\n      langSwitch:'EN',\n      nav:{ about:'نبذة', certs:'الشهادات', projects:'المشاريع', skills:'المهارات', contact:'تواصل' },\n      hero:{ kicker:'تم تأمين الجلسة بنجاح', role:'متخصصة في الأمن السيبراني', sub:'أمن هجومي، وأنظمة ويندوز، وأدوات دفاعية. أخترق الأنظمة لأفهم تمامًا كيف أحميها.', cta1:'استعراض المشاريع', cta2:'↓ تحميل السيرة الذاتية' },\n      about:{ label:'٠١ — من أنا', title:'نبذة عني', body:'متخصصة في الأمن السيبراني مع تركيز على الأمن الهجومي وأنظمة ويندوز. يمتد عملي من اختبار الاختراق، إلى أبحاث تصعيد الصلاحيات، وبناء أدوات دفاعية تحوّل النتائج الواقعية إلى فحوصات آلية وحلول معالجة.', body2:'يهمني العمق لا الضجيج: أن أفهم كيف يعمل الهجوم فعليًا، ثم أبني ما يجعل الهجوم القادم أصعب.',\n        s1:'شهادات احترافية', s2:'أدوات مفتوحة المصدر', s3:'مجالات التركيز', s3v:'هجوم + دفاع' },\n      certs:{ label:'٠٢ — الشهادات', title:'الشهادات الاحترافية', note:'شهادات أمنية عملية ومُوثّقة.' },\n      projects:{ label:'٠٣ — المستودعات', title:'المشاريع', note:'أدوات أمنية مفتوحة المصدر، مبنية من تجارب واقعية.', view:'عرض على GitHub' },\n      skills:{ label:'٠٤ — الترسانة', title:'المهارات والأدوات', note:'التقنيات والأدوات واللغات التي أعمل بها.' },\n      contact:{ label:'٠٥ — تواصل', title:'لنتحدث عن الأمن.', note:'منفتحة على الوظائف الأمنية والتعاون والأبحاث. تواصل معي في أي وقت.', email:'إرسال إيميل', cv:'↓ تحميل السيرة الذاتية' },\n      footer:'متخصصة في الأمن السيبراني', builtWith:'صُمّمت وبُنيت بعناية'\n    };\n    return this.state.lang === 'ar' ? ar : en;\n  }\n\n  setLang(l){ this.setState({ lang:l }); }\n\n  renderVals(){\n    const isAr = this.state.lang === 'ar';\n    const t = this.T();\n    const d = this.data();\n    const certs = d.certs.map((c,i)=>({ ...c, idx:String(i+1).padStart(2,'0'), name:isAr?c.ar:c.en, cat:isAr?c.cat_ar:c.cat_en }));\n    const projects = d.projects.map((p,i)=>({ ...p, idx:String(i+1).padStart(2,'0'), desc:isAr?p.ar:p.en, tagline:isAr?p.tag_ar:p.tag_en, stats:isAr?p.stats_ar:p.stats_en }));\n    const skills = d.skills.map(g=>({ ...g, label:isAr?g.ar:g.en }));\n    return {\n      isAr, dir: isAr?'rtl':'ltr', t, certs, projects, skills,\n      onToggleLang: ()=>this.setLang(isAr?'en':'ar'),\n      openCV: ()=>this.openCV()\n    };\n  }\n\n  componentDidMount(){\n    this._root = document.getElementById('aleen-root');\n    setTimeout(()=>{ try {\n      this.initReveal();\n      this.initScramble();\n      this.initTerminal();\n      this.initSpotlight();\n      this.initScrollSpy();\n    } catch(e){ console.warn('fx', e); } }, 60);\n  }\n\n  initReveal(){\n    const root=this._root; if(!root) return;\n    const items=[...root.querySelectorAll('[data-reveal]')];\n    items.forEach(el=>{ el.style.opacity='0'; el.style.transform='translateY(28px)'; el.style.transition='opacity .75s cubic-bezier(.2,.7,.2,1), transform .75s cubic-bezier(.2,.7,.2,1)'; });\n    if(!('IntersectionObserver' in window)){ items.forEach(el=>{el.style.opacity='1';el.style.transform='none';}); return; }\n    const io=new IntersectionObserver((entries)=>{\n      entries.forEach(e=>{ if(e.isIntersecting){ const el=e.target; const dl=+(el.getAttribute('data-delay')||0); setTimeout(()=>{ el.style.opacity='1'; el.style.transform='none'; }, dl); io.unobserve(el); } });\n    },{ threshold:0.12, rootMargin:'0px 0px -8% 0px' });\n    items.forEach(el=>io.observe(el));\n  }\n\n  initScramble(){\n    const root=this._root; if(!root) return;\n    const el=root.querySelector('#hero-name'); if(!el) return;\n    const final=el.getAttribute('data-text')||el.textContent; const chars='!<>-_\\\\/[]{}=+*^?#01';\n    if(document.hidden){ el.textContent=final; return; }\n    const queue=final.split('').map((c,i)=>({ c, start:Math.floor(Math.random()*12)+i*1.4, end:Math.floor(Math.random()*14)+i*1.4+14, r:'' }));\n    let frame=0;\n    const tick=()=>{ let out=''; let done=0;\n      for(const q of queue){ if(q.c===' '){ out+=' '; done++; continue; }\n        if(frame>=q.end){ out+=q.c; done++; }\n        else if(frame>=q.start){ if(!q.r||Math.random()<0.28) q.r=chars[Math.floor(Math.random()*chars.length)]; out+='<span style=\"color:#f59e42;opacity:.75\">'+q.r+'<\u002Fspan>'; }\n      }\n      el.innerHTML=out;\n      if(done<queue.length){ frame++; setTimeout(tick, 28); } else { el.textContent=final; }\n    };\n    el.innerHTML=''; tick();\n    setTimeout(()=>{ if(el.textContent.trim()!==final.trim()) el.textContent=final; }, 2000);\n  }\n\n  initTerminal(){\n    const root=this._root; if(!root) return;\n    const el=root.querySelector('#term-body'); if(!el) return;\n    const full=el.getAttribute('data-text')||''; el.textContent='';\n    const cur=document.createElement('span'); cur.textContent='▋'; cur.style.color='#f59e42'; cur.style.animation='blink 1s steps(1) infinite';\n    el.appendChild(cur);\n    let i=0;\n    const step=()=>{ if(i<=full.length){ cur.previousSibling && cur.previousSibling.remove ? null : null; el.textContent=full.slice(0,i); el.appendChild(cur); i++; setTimeout(step, full[i-1]==='\\n'?60:16); } };\n    setTimeout(step, 650);\n  }\n\n  initSpotlight(){\n    const root=this._root; if(!root) return;\n    const hero=root.querySelector('#hero'); if(!hero) return;\n    hero.addEventListener('pointermove', e=>{ const r=hero.getBoundingClientRect(); hero.style.setProperty('--mx', (((e.clientX-r.left)/r.width)*100).toFixed(1)+'%'); hero.style.setProperty('--my', (((e.clientY-r.top)/r.height)*100).toFixed(1)+'%'); });\n  }\n\n  initScrollSpy(){\n    const root=this._root; if(!root) return;\n    const secs=[...root.querySelectorAll('[data-sec]')];\n    const links=[...root.querySelectorAll('[data-navlink]')];\n    if(!('IntersectionObserver' in window)) return;\n    const io=new IntersectionObserver((entries)=>{\n      entries.forEach(e=>{ if(e.isIntersecting){ const id=e.target.getAttribute('data-sec'); links.forEach(l=>{ const on=l.getAttribute('data-navlink')===id; l.style.color=on?'#f59e42':'#8a7d6c'; }); } });\n    },{ rootMargin:'-46% 0px -50% 0px' });\n    secs.forEach(s=>io.observe(s));\n  }\n\n  openCV(){\n    const isAr=this.state.lang==='ar'; const d=this.data();\n    const certRows=d.certs.map(c=>`<tr><td style=\"padding:4px 14px 4px 0;font-weight:700;white-space:nowrap\">${c.abbr}<\u002Ftd><td style=\"padding:4px 0;color:#444\">${c.en} — ${c.org}<\u002Ftd><\u002Ftr>`).join('');\n    const projRows=d.projects.map(p=>`<div style=\"margin:0 0 14px\"><div style=\"font-weight:700\">${p.name} <span style=\"font-weight:400;color:#888;font-size:13px\">· github.com/${p.repo}<\u002Fspan><\u002Fdiv><div style=\"color:#333;font-size:13.5px;line-height:1.55;margin-top:3px\">${p.en}<\u002Fdiv><\u002Fdiv>`).join('');\n    const allSkills=d.skills.map(g=>`<div style=\"margin:0 0 8px\"><b>${g.en}:<\u002Fb> <span style=\"color:#444\">${g.items.join(' · ')}<\u002Fspan><\u002Fdiv>`).join('');\n    const html=`<!doctype html><html><head><meta charset=\"utf-8\"><title>Aleen Saleh Aljohany — CV<\u002Ftitle>\n    <link href=\"https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap\" rel=\"stylesheet\">\n    <style>@page{margin:18mm}body{font-family:'Space Grotesk',Arial,sans-serif;color:#1a1a1a;max-width:760px;margin:32px auto;padding:0 24px;line-height:1.5}h1{font-size:30px;margin:0;letter-spacing:-.5px}h2{font-size:13px;text-transform:uppercase;letter-spacing:1.5px;color:#c47a1f;border-bottom:1px solid #eee;padding-bottom:5px;margin:26px 0 12px;font-family:'JetBrains Mono',monospace}.role{font-family:'JetBrains Mono',monospace;color:#c47a1f;font-size:14px;margin:6px 0 2px}.contact{font-size:13px;color:#555;font-family:'JetBrains Mono',monospace}a{color:#1a1a1a}<\u002Fstyle><\u002Fhead>\n    <body>\n      <h1>Aleen Saleh Aljohany<\u002Fh1>\n      <div class=\"role\">Cybersecurity Specialist<\u002Fdiv>\n      <div class=\"contact\">aleensaljohani@gmail.com · github.com/aleen-aljohani · linkedin.com/in/aleen-aljohani<\u002Fdiv>\n      <h2>Summary<\u002Fh2>\n      <div style=\"font-size:14px;color:#222\">Cybersecurity specialist focused on offensive security and Windows systems — penetration testing, privilege-escalation research, and building defensive tooling that turns real-world findings into automated checks and remediation.<\u002Fdiv>\n      <h2>Certifications<\u002Fh2>\n      <table style=\"border-collapse:collapse;font-size:13.5px\">${certRows}<\u002Ftable>\n      <h2>Projects<\u002Fh2>\n      ${projRows}\n      <h2>Skills<\u002Fh2>\n      <div style=\"font-size:13.5px\">${allSkills}<\u002Fdiv>\n    <\u002Fbody><\u002Fhtml>`;\n    const w=window.open('','_blank'); if(!w){ alert('Please allow pop-ups to download the CV.'); return; }\n    w.document.open(); w.document.write(html); w.document.close(); w.focus();\n    setTimeout(()=>{ try{ w.print(); }catch(e){} }, 500);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
